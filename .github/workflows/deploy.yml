name: Deploy Apps

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # ── idle-game ──────────────────────────────────────────
      - name: Install dependencies (idle-game)
        run: npm ci
        working-directory: ./idle-game

      - name: Build (idle-game)
        run: npm run build
        working-directory: ./idle-game

      # ── DyWorld-Inc ────────────────────────────────────────
      - name: Install dependencies (DyWorld-Inc)
        run: npm ci
        working-directory: ./DyWorld-Inc

      - name: Build (DyWorld-Inc)
        run: npm run build
        working-directory: ./DyWorld-Inc

      # ── Assemble combined dist ─────────────────────────────
      - name: Assemble deploy folder
        run: |
          mkdir -p deploy/idle-game
          mkdir -p deploy/DyWorld-Inc
          cp -r ./idle-game/dist/.   deploy/idle-game/
          cp -r ./DyWorld-Inc/dist/. deploy/DyWorld-Inc/

      # ── Single deploy ──────────────────────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: gh-pages
